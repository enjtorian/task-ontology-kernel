site_name: Task Ontology Kernel (TOK) — AI-Native Task Ontology Core
site_description: TOK defines the ontological structure of tasks, making them first-class system primitives that can be natively executed, versioned, governed, and evolved by AI, ushering in the Task-Native software engineering paradigm. 
site_author: Ted Enjtorian
site_url: https://enjtorian.github.io/task-ontology-kernel
site_keywords: TOK, Task Ontology Kernel, POG, POG Task, Prompt Orchestration, Governance, LLM, AI, Software Development, SDLC, Vibe Coding

repo_name: Task Ontology Kernel
repo_url: https://github.com/enjtorian/task-ontology-kernel
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  javascript:
    - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - footnotes

extra:
  alternate:
    - name: English
      link: /task-ontology-kernel/
      lang: en
    - name: 繁體中文
      link: /task-ontology-kernel/zh-tw/
      lang: zh-tw

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - FAQ: faq.md
  - Glossary: glossary.md
  - Engineering Necessity: engineering-necessity.md
  - 繁體中文:
    - 首頁: zh-tw/index.md
    - 快速入門: zh-tw/quickstart.md
    - 常見問題: zh-tw/faq.md
    - 術語表: zh-tw/glossary.md
    - 工程必然性論證: zh-tw/engineering-necessity.md
